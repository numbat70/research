    <style>
        :root {
            --teal: #008080;
            --bg: #f4f7f6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
        }

        /* Tightened Teal Header */
        .header {
            background-color: var(--teal);
            color: white;
            padding: 10px 15px 15px; /* Minimal padding: Top 10px, Bottom 15px */
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #clock {
            font-size: 5rem;
            font-weight: bold;
            margin: 0;
            line-height: 1; /* Removes extra vertical space around the font itself */
        }

        #date {
            font-size: 1.3rem;
            margin-top: 0; /* Removed margin to pull it closer to the clock */
            font-weight: 300;
        }

        /* Compact Accordion / Concertina */
        .container {
            max-width: 950px;
            margin: 10px auto; /* Reduced margin from header */
            padding: 0 20px;
        }

        .accordion-item {
            background: white;
            border-radius: 4px;
            margin-bottom: 4px;
            border: 1px solid #ddd;
            overflow: hidden;
        }

        .accordion-header {
            padding: 10px 18px;
            cursor: pointer;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            border-left: 4px solid var(--teal);
            transition: background 0.2s;
        }

        .accordion-header:hover {
            background: #f0fdfa;
        }

        .accordion-content {
            display: none;
            padding: 10px 20px 15px;
            border-top: 1px solid #eee;
        }

        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .link-list li {
            padding: 5px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .link-list a {
            color: var(--teal);
            text-decoration: none;
            font-size: 1.05rem;
        }

        .link-list a:hover {
            text-decoration: underline;
        }

        .active-header {
            background: #f0fdfa;
        }
        
        .arrow {
            font-size: 0.8rem;
        }
    </style>
</head>

    function buildPage() {
        const sections = ["Agile", "External", "HRDD and Onboarding", "Lead Generation", "Martin", "Office 365", "Personal", "Personas", "PMF", "Pre Qualification", "Tools", "Training", "UR Every Day", "User Research", "Web Design"];
        const grouped = {};
        
        const lines = dataString.split(/(?=Yes|No)/);
        
        lines.forEach(line => {
            if (!line.startsWith("Yes")) return;
            
            let foundSection = "";
            sections.forEach(s => { if (line.substring(3).startsWith(s)) foundSection = s; });
            
            if (foundSection) {
                const urlMatch = line.match(/(https?:\/\/|file:\/\/|\.\.\/)(.*)/);
                if (urlMatch) {
                    const url = urlMatch[0];
                    const linkText = line.substring(3 + foundSection.length).replace(url, "").trim();
                    if (!grouped[foundSection]) grouped[foundSection] = [];
                    grouped[foundSection].push({ text: linkText, url: url });
                }
            }
        });

        const container = document.getElementById('main-container');
        Object.keys(grouped).sort().forEach(sec => {
            const item = document.createElement('div');
            item.className = 'accordion-item';
            item.innerHTML = `
                <div class="accordion-header"><span>${sec}</span><span class="arrow">▼</span></div>
                <div class="accordion-content"><ul class="link-list">
                    ${grouped[sec].map(l => `<li><a href="${l.url}" target="_blank">${l.text}</a></li>`).join('')}
                </ul></div>`;
            container.appendChild(item);
            item.querySelector('.accordion-header').addEventListener('click', function() {
                const content = this.nextElementSibling;
                const isOpen = content.style.display === 'block';
                document.querySelectorAll('.accordion-content').forEach(c => c.style.display = 'none');
                document.querySelectorAll('.accordion-header').forEach(h => h.classList.remove('active-header'));
                if (!isOpen) {
                    content.style.display = 'block';
                    this.classList.add('active-header');
                }
            });
        });
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
        
        const day = now.toLocaleDateString('en-GB', { weekday: 'long' });
        const month = now.toLocaleDateString('en-GB', { month: 'long' });
        const year = now.getFullYear();
        const dateNum = now.getDate();
        
        let suffix = "th";
        if (dateNum % 10 === 1 && dateNum !== 11) suffix = "st";
        else if (dateNum % 10 === 2 && dateNum !== 12) suffix = "nd";
        else if (dateNum % 10 === 3 && dateNum !== 13) suffix = "rd";
        
        document.getElementById('date').textContent = `${day}, ${dateNum}${suffix} ${month} ${year}`;
    }

    setInterval(updateTime, 1000);
    updateTime();
    buildPage();
</script>
